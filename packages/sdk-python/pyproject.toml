[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rubric-guard"
version = "0.1.0"
description = "AI output quality monitoring — Sentry for AI"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["ai", "llm", "observability", "monitoring", "quality"]
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.30.0"]
all = ["openai>=1.0.0", "anthropic>=0.30.0"]

[project.urls]
Homepage = "https://github.com/rubric-dev/rubric"

[tool.hatch.build.targets.wheel]
packages = ["rubric"]
